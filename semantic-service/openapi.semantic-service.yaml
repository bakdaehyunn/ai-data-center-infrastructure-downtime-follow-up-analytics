openapi: 3.1.0
info:
  title: AI Data Center Semantic Service API Contract
  version: 2026-06-phase18-response-contract-checkpoint
  description: >
    Non-runtime OpenAPI-style scaffold for the future Java/Kotlin semantic
    service. Phase 18 aligns future response DTO shapes with the Phase 17
    query-result envelopes. This contract documents endpoint shapes and DTOs
    only. It is not wired to controllers, code generation, authentication,
    orchestration, graph promotion, or production SPARQL execution.
servers:
  - url: https://semantic-service.example.invalid
    description: Placeholder only; no runtime service exists in Phase 18.
paths:
  /semantic/query/{queryId}:
    post:
      operationId: executeSemanticQuery
      summary: Execute an approved semantic query by id
      parameters:
        - name: queryId
          in: path
          required: true
          schema:
            type: string
          description: Approved query identifier from queries/manifest.ttl.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryExecutionRequest"
      responses:
        "200":
          description: Typed query result envelope aligned to Phase 17 result contracts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryExecutionResponse"
        default:
          description: Semantic service error envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticErrorResponse"
  /semantic/reasoning/validate:
    post:
      operationId: validateReasoningOutput
      summary: Validate candidate reasoning output against SHACL shapes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasoningValidationRequest"
      responses:
        "200":
          description: Reasoning validation result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReasoningValidationResponse"
  /semantic/provenance/{resourceId}:
    get:
      operationId: lookupProvenance
      summary: Look up provenance for a semantic resource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
          description: Encoded resource IRI or service-level resource id.
      responses:
        "200":
          description: Provenance lookup result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvenanceLookupResponse"
  /semantic/promotion/review:
    post:
      operationId: reviewPromotionCandidate
      summary: Review reasoning candidates before graph promotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionReviewRequest"
      responses:
        "200":
          description: Promotion review result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionReviewResponse"
  /semantic/ai-governance/handoff:
    post:
      operationId: handoffAIGovernance
      summary: Hand off AI-proposed graph changes or high-impact findings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGovernanceHandoffRequest"
      responses:
        "200":
          description: AI governance handoff result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIGovernanceHandoffResponse"
components:
  schemas:
    GraphScope:
      type: string
      enum:
        - canonical
        - provenance
        - reasoning
        - reasoning-audit
        - ai-audit
    QueryExecutionRequest:
      type: object
      required:
        - parameters
        - graphScopes
      properties:
        parameters:
          type: object
          additionalProperties:
            type: string
        graphScopes:
          type: array
          items:
            $ref: "#/components/schemas/GraphScope"
        timeoutMs:
          type: integer
          minimum: 1
    QueryExecutionResponse:
      oneOf:
        - $ref: "#/components/schemas/NamedGraphInventoryResponse"
        - $ref: "#/components/schemas/IncidentSummaryResponse"
        - $ref: "#/components/schemas/ProvenanceSourceRecordsResponse"
        - $ref: "#/components/schemas/FollowUpQueueResponse"
      discriminator:
        propertyName: resultType
        mapping:
          named-graph-inventory: "#/components/schemas/NamedGraphInventoryResponse"
          incident-summary: "#/components/schemas/IncidentSummaryResponse"
          provenance-source-records: "#/components/schemas/ProvenanceSourceRecordsResponse"
          follow-up-queue: "#/components/schemas/FollowUpQueueResponse"
    QueryResultEnvelopeBase:
      type: object
      required:
        - queryId
        - resultType
        - recordCount
        - records
        - provenance
      properties:
        queryId:
          type: string
        resultType:
          type: string
          enum:
            - named-graph-inventory
            - incident-summary
            - provenance-source-records
            - follow-up-queue
        recordCount:
          type: integer
          minimum: 0
        records:
          type: array
          items:
            type: object
        provenance:
          $ref: "#/components/schemas/SemanticResponseProvenance"
      additionalProperties: false
    NamedGraphInventoryResponse:
      allOf:
        - $ref: "#/components/schemas/QueryResultEnvelopeBase"
        - type: object
          required:
            - records
          properties:
            resultType:
              type: string
              enum:
                - named-graph-inventory
            records:
              type: array
              items:
                $ref: "#/components/schemas/NamedGraphInventoryRecord"
    NamedGraphInventoryRecord:
      type: object
      required:
        - graphUri
        - subjectCount
      properties:
        graphUri:
          type: string
        subjectCount:
          type: integer
          minimum: 0
      additionalProperties: false
    IncidentSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/QueryResultEnvelopeBase"
        - type: object
          required:
            - records
          properties:
            resultType:
              type: string
              enum:
                - incident-summary
            records:
              type: array
              items:
                $ref: "#/components/schemas/IncidentSummaryRecord"
    IncidentSummaryRecord:
      type: object
      required:
        - graphUri
        - incidentUri
        - incidentId
        - assetUri
        - stageUri
      properties:
        graphUri:
          type: string
        incidentUri:
          type: string
        incidentId:
          type: string
        assetUri:
          type: string
        stageUri:
          type: string
        sourceRecordUri:
          type: string
      additionalProperties: false
    ProvenanceSourceRecordsResponse:
      allOf:
        - $ref: "#/components/schemas/QueryResultEnvelopeBase"
        - type: object
          required:
            - records
          properties:
            resultType:
              type: string
              enum:
                - provenance-source-records
            records:
              type: array
              items:
                $ref: "#/components/schemas/ProvenanceSourceRecord"
    ProvenanceSourceRecord:
      type: object
      required:
        - graphUri
        - sourceRecordUri
        - sourceRecordId
        - sourceSystemUri
        - payloadHash
        - activityUri
      properties:
        graphUri:
          type: string
        sourceRecordUri:
          type: string
        sourceRecordId:
          type: string
        sourceSystemUri:
          type: string
        payloadHash:
          type: string
        activityUri:
          type: string
      additionalProperties: false
    FollowUpQueueResponse:
      allOf:
        - $ref: "#/components/schemas/QueryResultEnvelopeBase"
        - type: object
          required:
            - records
          properties:
            resultType:
              type: string
              enum:
                - follow-up-queue
            records:
              type: array
              items:
                $ref: "#/components/schemas/FollowUpQueueRecord"
    FollowUpQueueRecord:
      type: object
      required:
        - graphUri
        - incidentUri
        - incidentId
        - assetUri
        - assetId
        - zoneUri
        - zoneId
        - stageUri
        - sourceRecordUri
      properties:
        graphUri:
          type: string
        incidentUri:
          type: string
        incidentId:
          type: string
        assetUri:
          type: string
        assetId:
          type: string
        zoneUri:
          type: string
        zoneId:
          type: string
        stageUri:
          type: string
        stageLabel:
          type: string
        sourceRecordUri:
          type: string
      additionalProperties: false
    ReasoningValidationRequest:
      type: object
      required:
        - candidateGraph
        - shapeSet
      properties:
        candidateGraph:
          type: string
          example: urn:dcai:graph:reasoning-audit
        shapeSet:
          type: string
          example: shapes/reasoning-output-validation.ttl
        candidateIds:
          type: array
          items:
            type: string
    ReasoningValidationResponse:
      type: object
      required:
        - conforms
        - findings
      properties:
        conforms:
          type: boolean
        findings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationFinding"
    ProvenanceLookupResponse:
      type: object
      required:
        - resourceId
        - lineage
      properties:
        resourceId:
          type: string
        lineage:
          type: array
          items:
            $ref: "#/components/schemas/LineageEdge"
    PromotionReviewRequest:
      type: object
      required:
        - candidateGraph
        - candidateIds
      properties:
        candidateGraph:
          type: string
          example: urn:dcai:graph:reasoning-audit
        candidateIds:
          type: array
          items:
            type: string
        reviewerId:
          type: string
    PromotionReviewResponse:
      type: object
      required:
        - reviewStatus
        - promotionAllowed
      properties:
        reviewStatus:
          type: string
          enum:
            - approved
            - rejected
            - needs-review
        promotionAllowed:
          type: boolean
        reasons:
          type: array
          items:
            type: string
    AIGovernanceHandoffRequest:
      type: object
      required:
        - proposalId
        - proposedGraph
        - riskClass
      properties:
        proposalId:
          type: string
        proposedGraph:
          type: string
          example: urn:dcai:graph:ai-audit
        riskClass:
          type: string
          enum:
            - low
            - medium
            - high
        requestedBy:
          type: string
    AIGovernanceHandoffResponse:
      type: object
      required:
        - handoffId
        - governanceStatus
      properties:
        handoffId:
          type: string
        governanceStatus:
          type: string
          enum:
            - queued
            - rejected
            - needs-human-review
        requiredGates:
          type: array
          items:
            type: string
    ValidationFinding:
      type: object
      required:
        - severity
        - message
      properties:
        severity:
          type: string
          enum:
            - info
            - warning
            - violation
        message:
          type: string
        sourceShape:
          type: string
        focusNode:
          type: string
    LineageEdge:
      type: object
      required:
        - subject
        - predicate
        - object
      properties:
        subject:
          type: string
        predicate:
          type: string
        object:
          type: string
    SemanticResponseProvenance:
      type: object
      required:
        - queryId
        - graphScope
        - contractVersion
      properties:
        queryId:
          type: string
        graphScope:
          type: string
        contractVersion:
          type: string
          example: 2026.06.phase17-result-envelope
      additionalProperties: false
    SemanticErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/SemanticError"
      additionalProperties: false
    SemanticError:
      type: object
      required:
        - code
        - message
        - contractVersion
      properties:
        code:
          type: string
          enum:
            - unapproved-query-id
            - unsupported-result-envelope
            - missing-required-binding
            - graph-unavailable
            - contract-validation-failed
            - internal-semantic-service-error
        message:
          type: string
        detail:
          type: string
        queryId:
          type: string
        contractVersion:
          type: string
          example: 2026.06.phase18-error-envelope
      additionalProperties: false
