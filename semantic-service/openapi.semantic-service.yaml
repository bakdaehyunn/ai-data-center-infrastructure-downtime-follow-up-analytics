    ReasoningValidationRequest:
      type: object
      required:
        - candidateGraph
        - shapeSet
      properties:
        candidateGraph:
          type: string
          example: urn:dcai:graph:reasoning-audit
        shapeSet:
          type: string
          example: shapes/reasoning-output-validation.ttl
        candidateIds:
          type: array
          items:
            type: string
    ReasoningValidationResponse:
      type: object
      required:
        - conforms
        - findings
      properties:
        conforms:
          type: boolean
        findings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationFinding"
    ProvenanceLookupResponse:
      type: object
      required:
        - resourceId
        - lineage
      properties:
        resourceId:
          type: string
        lineage:
          type: array
          items:
            $ref: "#/components/schemas/LineageEdge"
    PromotionReviewRequest:
      type: object
      required:
        - candidateGraph
        - candidateIds
      properties:
        candidateGraph:
          type: string
          example: urn:dcai:graph:reasoning-audit
        candidateIds:
          type: array
          items:
            type: string
        reviewerId:
          type: string
    PromotionReviewResponse:
      type: object
      required:
        - reviewStatus
        - promotionAllowed
      properties:
        reviewStatus:
          type: string
          enum:
            - approved
            - rejected
            - needs-review
        promotionAllowed:
          type: boolean
        reasons:
          type: array
          items:
            type: string
    AIGovernanceHandoffRequest:
      type: object
      required:
        - proposalId
        - proposedGraph
        - riskClass
      properties:
        proposalId:
          type: string
        proposedGraph:
          type: string
          example: urn:dcai:graph:ai-audit
        riskClass:
          type: string
          enum:
            - low
            - medium
            - high
        requestedBy:
          type: string
    AIGovernanceHandoffResponse:
      type: object
      required:
        - handoffId
        - governanceStatus
      properties:
        handoffId:
          type: string
        governanceStatus:
          type: string
          enum:
            - queued
            - rejected
            - needs-human-review
        requiredGates:
          type: array
          items:
            type: string
    ValidationFinding:
      type: object
      required:
        - severity
        - message
      properties:
        severity:
          type: string
          enum:
            - info
            - warning
            - violation
        message:
          type: string
        sourceShape:
          type: string
        focusNode:
          type: string
    LineageEdge:
      type: object
      required:
        - subject
        - predicate
        - object
      properties:
        subject:
          type: string
        predicate:
          type: string
        object:
          type: string
    SemanticResponseProvenance:
      type: object
      required:
        - queryId
        - graphScope
        - contractVersion
      properties:
        queryId:
          type: string
        graphScope:
          type: string
        contractVersion:
          type: string
          example: 2026.06.phase17-result-envelope
      additionalProperties: false
    SemanticErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/SemanticError"
      additionalProperties: false
    SemanticError:
      type: object
      required:
        - code
        - message
        - contractVersion
      properties:
        code:
          type: string
          enum:
            - unapproved-query-id
            - unsupported-result-envelope
            - missing-required-binding
            - graph-unavailable
            - contract-validation-failed
            - internal-semantic-service-error
        message:
          type: string
        detail:
          type: string
        queryId:
          type: string
        contractVersion:
          type: string
          example: 2026.06.phase18-error-envelope
      additionalProperties: false
