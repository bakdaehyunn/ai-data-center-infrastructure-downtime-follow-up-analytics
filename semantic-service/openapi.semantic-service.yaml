openapi: 3.1.0
info:
  title: AI Data Center Semantic Service API Contract
  version: 2026-06-phase18-response-contract-checkpoint
  description: >
    Non-runtime OpenAPI-style scaffold for the future Java/Kotlin semantic
    service. Phase 18 aligns future response DTO shapes with the Phase 17
    query-result envelopes. This contract documents endpoint shapes and DTOs
    only. It is not wired to controllers, code generation, authentication,
    orchestration, graph promotion, or production SPARQL execution.
servers:
  - url: https://semantic-service.example.invalid
    description: Placeholder only; no runtime service exists in Phase 18.
paths:
  /semantic/query/{queryId}:
    post:
      operationId: executeSemanticQuery
      summary: Execute an approved semantic query by id
      parameters:
        - name: queryId
          in: path
          required: true
          schema:
            type: string
          description: Approved query identifier from queries/manifest.ttl.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryExecutionRequest"
      responses:
        "200":
          description: Typed query result envelope aligned to Phase 17 result contracts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryExecutionResponse"
        default:
          description: Semantic service error envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticErrorResponse"
  /semantic/reasoning/validate:
    post:
      operationId: validateReasoningOutput
      summary: Validate candidate reasoning output against SHACL shapes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasoningValidationRequest"
      responses:
        "200":
          description: Reasoning validation result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReasoningValidationResponse"
  /semantic/provenance/{resourceId}:
    get:
      operationId: lookupProvenance
      summary: Look up provenance for a semantic resource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
          description: Encoded resource IRI or service-level resource id.
      responses:
        "200":
          description: Provenance lookup result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvenanceLookupResponse"
  /semantic/promotion/review:
    post:
      operationId: reviewPromotionCandidate
      summary: Review reasoning candidates before graph promotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromotionReviewRequest"
      responses:
        "200":
          description: Promotion review result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionReviewResponse"
  /semantic/ai-governance/handoff:
    post:
      operationId: handoffAIGovernance
      summary: Hand off AI-proposed graph changes or high-impact findings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGovernanceHandoffRequest"
      responses:
        "200":
          description: AI governance handoff result envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIGovernanceHandoffResponse"
components:
  schemas:
    GraphScope:
      type: string
      enum:
        - canonical
        - provenance
        - reasoning
        - reasoning-audit
        - ai-audit
    QueryExecutionRequest:
      type: object
      required:
        - parameters
        - graphScopes
      properties:
        parameters:
          type: object
          additionalProperties:
            type: string
        graphScopes:
          type: array
          items:
            $ref: "#/components/schemas/GraphScope"
        timeoutMs:
          type: integer
          minimum: 1
    QueryExecutionResponse:
      oneOf:
        - $ref: "#/components/schemas/NamedGraphInventoryResponse"
        - $ref: "#/components/schemas/IncidentSummaryResponse"
        - $ref: "#/components/schemas/ProvenanceSourceRecordsResponse"
        - $ref: "#/components/schemas/FollowUpQueueResponse"
        - $ref: "#/components/schemas/DashboardOverviewResponse"
        - $ref: "#/components/schemas/FilterMetadataResponse"
        - $ref: "#/components/schemas/FollowUpDetailResponse"
        - $ref: "#/components/schemas/ImpactSummaryResponse"
        - $ref: "#/components/schemas/TopologyDependenciesResponse"
        - $ref: "#/components/schemas/TrustFindingsResponse"
        - $ref: "#/components/schemas/StageBottlenecksResponse"
        - $ref: "#/components/schemas/AssetDelaySummaryResponse"
        - $ref: "#/components/schemas/ZoneDelaySummaryResponse"
        - $ref: "#/components/schemas/SpareWaitSummaryResponse"
        - $ref: "#/components/schemas/ValidationSummaryResponse"
        - $ref: "#/components/schemas/IncidentEvidenceResponse"
        - $ref: "#/components/schemas/IncidentTimelineResponse"
        - $ref: "#/components/schemas/DependencyImpactResponse"
        - $ref: "#/components/schemas/BlastRadiusResponse"
      discriminator:
        propertyName: resultType
        mapping:
          named-graph-inventory: "#/components/schemas/NamedGraphInventoryResponse"
          incident-summary: "#/components/schemas/IncidentSummaryResponse"
          provenance-source-records: "#/components/schemas/ProvenanceSourceRecordsResponse"
          follow-up-queue: "#/components/schemas/FollowUpQueueResponse"
          dashboard-overview: "#/components/schemas/DashboardOverviewResponse"
          filter-metadata: "#/components/schemas/FilterMetadataResponse"
          follow-up-detail: "#/components/schemas/FollowUpDetailResponse"
          impact-summary: "#/components/schemas/ImpactSummaryResponse"
          topology-dependencies: "#/components/schemas/TopologyDependenciesResponse"
          trust-findings: "#/components/schemas/TrustFindingsResponse"
          stage-bottlenecks: "#/components/schemas/StageBottlenecksResponse"
          asset-delay-summary: "#/components/schemas/AssetDelaySummaryResponse"
          zone-delay-summary: "#/components/schemas/ZoneDelaySummaryResponse"
          spare-wait-summary: "#/components/schemas/SpareWaitSummaryResponse"
          validation-summary: "#/components/schemas/ValidationSummaryResponse"
          incident-evidence: "#/components/schemas/IncidentEvidenceResponse"
          incident-timeline: "#/components/schemas/IncidentTimelineResponse"
          dependency-impact: "#/components/schemas/DependencyImpactResponse"
          blast-radius: "#/components/schemas/BlastRadiusResponse"
    QueryResultEnvelopeBase:
      type: object
      required:
        - queryId
        - resultType
        - recordCount
        - records
        - provenance
      properties:
        queryId:
          type: string
        resultType:
          type: string
          enum:
            - named-graph-inventory
            - incident-summary
            - provenance-source-records
            - follow-up-queue
            - dashboard-overview
            - filter-metadata
            - follow-up-detail
            - impact-summary
            - topology-dependencies
            - trust-findings
            - stage-bottlenecks
            - asset-delay-summary
            - zone-delay-summary
            - spare-wait-summary
            - validation-summary
            - incident-evidence
            - incident-timeline
            - dependency-impact
            - blast-radius
        recordCount:
          type: integer
          minimum: 0
        records:
          type: array
          items:
            type: object
        provenance:
          $ref: "#/components/schemas/SemanticResponseProvenance"
      additionalProperties: false
    NamedGraphInventoryResponse:
      allOf:
        - $ref: "#/components/schemas/QueryResultEnvelopeBase"
