services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-data-center-infrastructure-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-infrastructure}
      POSTGRES_USER: ${POSTGRES_USER:-infrastructure}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infrastructure}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infrastructure} -d ${POSTGRES_DB:-infrastructure}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
