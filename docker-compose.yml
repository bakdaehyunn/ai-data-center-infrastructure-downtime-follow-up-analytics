services:
  postgres:
    image: postgres:16-alpine
    container_name: procurement-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-procurement}
      POSTGRES_USER: ${POSTGRES_USER:-procurement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-procurement}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-procurement} -d ${POSTGRES_DB:-procurement}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
